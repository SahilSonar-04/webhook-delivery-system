databases:
  - name: wds-postgres
    databaseName: webhook_db
    user: webhook_user
    plan: free

services:
  - type: web
    name: wds-mock-subscriber
    runtime: python
    rootDir: mock-subscriber
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0

  - type: web
    name: wds-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wds-postgres
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false